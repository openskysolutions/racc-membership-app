
name: Deploy to DigitalOcean

on:
  push:
    branches: [dev]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      # Build and test backend
      - name: Install backend dependencies
        working-directory: ./ghl-api
        run: npm ci

      - name: Build backend
        working-directory: ./ghl-api
        run: npm run build

      - name: Test backend build output
        working-directory: ./ghl-api
        run: |
          if [ ! -f "dist/server.js" ]; then
            echo "ERROR: Backend build failed - dist/server.js not found"
            exit 1
          fi
          echo "Backend build successful"

      # Build and test frontend
      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          TEMP_GHL_TOKEN: ${{ secrets.TEMP_GHL_TOKEN }}
        run: npm run build

      - name: Test frontend build output
        run: |
          if [ ! -d "dist" ]; then
            echo "ERROR: Frontend build failed - dist directory not found"
            exit 1
          fi
          if [ ! -f "dist/index.html" ]; then
            echo "ERROR: Frontend build failed - dist/index.html not found"
            exit 1
          fi
          echo "Frontend build successful"

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DO_DEPLOY_KEY }}

      - name: Deploy to Droplet
        env:
          # Backend environment variables (mix of secrets and vars)
          PORT: ${{ vars.PORT }}
          NODE_ENV: ${{ vars.NODE_ENV }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PRIVATE_INTEGRATION_TOKEN: ${{ secrets.PRIVATE_INTEGRATION_TOKEN }}
          LOCATION_ID: ${{ vars.LOCATION_ID }}
          CALENDAR_ID: ${{ vars.CALENDAR_ID }}
          TEST_CONTACT_ID: ${{ vars.TEST_CONTACT_ID }}
          GHL_API_BASE_URL: ${{ vars.GHL_API_BASE_URL }}
          FRONTEND_URL: ${{ vars.FRONTEND_URL }}
          # Email provider variables
          EMAIL_PROVIDER: ${{ vars.EMAIL_PROVIDER }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_FROM: ${{ vars.EMAIL_FROM }}
          EMAIL_FROM_NAME: ${{ vars.EMAIL_FROM_NAME }}
          # Frontend environment variables
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          TEMP_GHL_TOKEN: ${{ secrets.TEMP_GHL_TOKEN }}
        run: |
          ssh -o StrictHostKeyChecking=no root@members.richfieldareachamber.com << ENDSSH
          cd /root/racc-membership-app || git clone https://github.com/openskysolutions/racc-membership-app.git && cd racc-membership-app
          
          # Handle potential conflicts by resetting any local changes
          git fetch origin
          git reset --hard origin/dev
          
          # Set all environment variables for the entire session
          export PORT="$PORT"
          export NODE_ENV="$NODE_ENV"
          export DATABASE_URL="$DATABASE_URL"
          export PRIVATE_INTEGRATION_TOKEN="$PRIVATE_INTEGRATION_TOKEN"
          export LOCATION_ID="$LOCATION_ID"
          export CALENDAR_ID="$CALENDAR_ID"
          export TEST_CONTACT_ID="$TEST_CONTACT_ID"
          export GHL_API_BASE_URL="$GHL_API_BASE_URL"
          export FRONTEND_URL="$FRONTEND_URL"
          export EMAIL_PROVIDER="$EMAIL_PROVIDER"
          export EMAIL_USER="$EMAIL_USER"
          export EMAIL_PASS="$EMAIL_PASS"
          export EMAIL_FROM="$EMAIL_FROM"
          export EMAIL_FROM_NAME="$EMAIL_FROM_NAME"
          export VITE_API_BASE_URL="$VITE_API_BASE_URL"
          export TEMP_GHL_TOKEN="$TEMP_GHL_TOKEN"
          
          # Create backend .env file
          cd ghl-api
          cat > .env << EOF
          PORT=\$PORT
          NODE_ENV=\$NODE_ENV
          DATABASE_URL=\$DATABASE_URL
          PRIVATE_INTEGRATION_TOKEN=\$PRIVATE_INTEGRATION_TOKEN
          LOCATION_ID=\$LOCATION_ID
          CALENDAR_ID=\$CALENDAR_ID
          TEST_CONTACT_ID=\$TEST_CONTACT_ID
          GHL_API_BASE_URL=\$GHL_API_BASE_URL
          FRONTEND_URL=\$FRONTEND_URL
          EMAIL_PROVIDER=\$EMAIL_PROVIDER
          EMAIL_USER=\$EMAIL_USER
          EMAIL_PASS=\$EMAIL_PASS
          EMAIL_FROM=\$EMAIL_FROM
          EMAIL_FROM_NAME=\$EMAIL_FROM_NAME
          EOF
          
          # Install all dependencies (including devDependencies for build tools)
          npm install
          
          # Build the API with proper path alias resolution
          echo "Building backend..."
          if ! npm run build; then
            echo "ERROR: Backend build failed"
            exit 1
          fi
          
          # Verify the build was successful and imports are resolved
          if [ ! -f "dist/server.js" ]; then
            echo "ERROR: API build failed - dist/server.js not found"
            exit 1
          fi
          
          # Check that path aliases were properly resolved in the build
          if grep -q "@/" dist/app.js; then
            echo "ERROR: Path aliases not resolved in build - found '@/' imports"
            exit 1
          fi
          
          echo "API build successful - path aliases properly resolved"
          
          # Zero-downtime deployment: Start new process on different port, test it, then switch
          echo "=== Starting zero-downtime deployment for API ==="
          
          # Check if racc-api is already running
          pm2 describe racc-api > /dev/null 2>&1
          API_RUNNING=\$?
          
          if [ \$API_RUNNING -eq 0 ]; then
            echo "Existing racc-api service detected - performing rolling update"
            
            # Start new instance with a temporary name on a test port
            # wait-ready: PM2 waits for process.send('ready') signal before marking as online
            PORT_TEMP=3099 pm2 start dist/server.js --name racc-api-new --wait-ready --listen-timeout 15000
            
            # Wait for new instance to be ready
            sleep 3
            
            # Health check on new instance
            echo "Running health check on new API instance..."
            HEALTH_CHECK=\$(curl -f -s http://localhost:3099/health || echo "FAILED")
            
            if [[ "\$HEALTH_CHECK" == "FAILED" ]]; then
              echo "ERROR: New API instance failed health check"
              pm2 logs racc-api-new --lines 20
              pm2 delete racc-api-new
              echo "Keeping existing racc-api service running"
              exit 1
            fi
            
            echo "New API instance health check passed"
            
            # Stop new temporary instance
            pm2 delete racc-api-new
            
            # Now reload the main instance (PM2 will do graceful reload)
            echo "Reloading main API instance..."
            pm2 reload racc-api --update-env
            
          else
            echo "No existing racc-api service - starting fresh"
            pm2 start dist/server.js --name racc-api --wait-ready --listen-timeout 15000
          fi
          
          # Verify API is running
          sleep 3
          if ! pm2 describe racc-api | grep -q "online"; then
            echo "ERROR: racc-api failed to start"
            pm2 logs racc-api --lines 20
            exit 1
          fi
          
          # Final health check
          echo "Running final health check on API..."
          FINAL_HEALTH=\$(curl -f -s http://localhost:3000/health || echo "FAILED")
          if [[ "\$FINAL_HEALTH" == "FAILED" ]]; then
            echo "ERROR: API service not responding to health checks"
            pm2 logs racc-api --lines 20
            exit 1
          fi
          
          echo "API service is running successfully"
          
          # Create frontend .env file
          cd ../
          cat > .env << EOF
          VITE_API_BASE_URL=\$VITE_API_BASE_URL
          TEMP_GHL_TOKEN=\$TEMP_GHL_TOKEN
          EOF
          
          # Debug: Show environment variables
          echo "=== Environment Variables for Frontend Build ==="
          echo "VITE_API_BASE_URL=\$VITE_API_BASE_URL"
          echo "TEMP_GHL_TOKEN=\$TEMP_GHL_TOKEN"
          echo "=== Contents of .env file ==="
          cat .env
          echo "=== End Debug ==="
          
          # Clean any existing build and node_modules cache
          rm -rf dist/ node_modules/.vite/
          
          # Install dependencies including devDependencies for build tools
          # This ensures all build tools like @vitejs/plugin-react are available
          NODE_ENV=development npm install
          
          # Verify critical build dependencies are installed
          if [ ! -d "node_modules/@vitejs/plugin-react" ]; then
            echo "ERROR: @vitejs/plugin-react not found in node_modules"
            exit 1
          fi
          
          if [ ! -d "node_modules/vite" ]; then
            echo "ERROR: vite not found in node_modules"
            exit 1
          fi
          
          echo "Build dependencies verified successfully"
          
          # Build frontend with environment variables
          echo "Building frontend..."
          if ! VITE_API_BASE_URL="\$VITE_API_BASE_URL" TEMP_GHL_TOKEN="\$TEMP_GHL_TOKEN" npm run build; then
            echo "ERROR: Frontend build failed"
            exit 1
          fi
          
          # Verify build output exists
          if [ ! -f "dist/index.html" ]; then
            echo "ERROR: Frontend build failed - dist/index.html not found"
            exit 1
          fi
          
          # Frontend build successful, now set up the serving
          echo "Frontend build successful"
          
          # Verify the build used the correct API URL
          echo "=== Checking built files for API URL ==="
          grep -r "localhost:3000" dist/ || echo "No localhost:3000 found in build"
          grep -r "members.richfieldareachamber.com" dist/ | head -3 || echo "No production URL found in build"
          
          # Start or restart frontend service using serve.js from the build directory
          echo "=== Starting zero-downtime deployment for Frontend ==="
          
          pm2 describe racc-frontend > /dev/null 2>&1
          FRONTEND_RUNNING=\$?
          
          if [ \$FRONTEND_RUNNING -eq 0 ]; then
            echo "Existing racc-frontend service detected - performing rolling update"
            
            # Start new instance on different port for testing
            PORT=3099 pm2 start serve.js --name racc-frontend-new --cwd /root/racc-membership-app
            
            # Wait for service to start
            sleep 3
            
            # Health check on new instance
            echo "Running health check on new frontend instance..."
            if ! curl -f -s http://localhost:3099 > /dev/null; then
              echo "ERROR: New frontend instance failed health check"
              pm2 logs racc-frontend-new --lines 20
              pm2 delete racc-frontend-new
              echo "Keeping existing racc-frontend service running"
              exit 1
            fi
            
            # Test client-side routing on new instance
            if ! curl -f -s http://localhost:3099/register > /dev/null; then
              echo "ERROR: New frontend instance not handling routes properly"
              pm2 logs racc-frontend-new --lines 20
              pm2 delete racc-frontend-new
              echo "Keeping existing racc-frontend service running"
              exit 1
            fi
            
            echo "New frontend instance health checks passed"
            
            # Stop the temporary test instance
            pm2 delete racc-frontend-new
            
            # Now reload the main instance
            echo "Reloading main frontend instance..."
            pm2 reload racc-frontend
            
          else
            echo "No existing racc-frontend service - starting fresh"
            pm2 start serve.js --name racc-frontend --cwd /root/racc-membership-app
          fi
          
          # Verify frontend service is running
          sleep 3
          if ! pm2 describe racc-frontend | grep -q "online"; then
            echo "ERROR: racc-frontend failed to start"
            pm2 logs racc-frontend --lines 10
            exit 1
          fi
          
          # Test that the frontend service is responding
          echo "Testing frontend service..."
          curl -f http://localhost:3001 > /dev/null || {
            echo "ERROR: Frontend service not responding on port 3001"
            pm2 logs racc-frontend --lines 10
            exit 1
          }
          
          # Test that the frontend handles client-side routing
          echo "Testing client-side routing..."
          curl -f http://localhost:3001/register > /dev/null || {
            echo "ERROR: Frontend service not handling client-side routes properly"
            pm2 logs racc-frontend --lines 10
            exit 1
          }
          
          echo "Frontend service tests passed"
          
          # Update nginx configuration to properly proxy to frontend service
          cat > /etc/nginx/sites-available/racc-membership-app << 'NGINXEOF'
          server {
              listen 80;
              server_name members.richfieldareachamber.com;
          
              # API routes - proxy to backend service
              location /api {
                  proxy_pass http://localhost:3000;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade \$http_upgrade;
                  proxy_set_header Connection 'upgrade';
                  proxy_set_header Host \$host;
                  proxy_set_header X-Real-IP \$remote_addr;
                  proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto \$scheme;
                  proxy_cache_bypass \$http_upgrade;
              }
          
              # All other routes - proxy to frontend service for SPA routing
              location / {
                  proxy_pass http://localhost:3001;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade \$http_upgrade;
                  proxy_set_header Connection 'upgrade';
                  proxy_set_header Host \$host;
                  proxy_set_header X-Real-IP \$remote_addr;
                  proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto \$scheme;
                  proxy_cache_bypass \$http_upgrade;
                  
                  # Cache busting headers for development
                  add_header Cache-Control "no-cache, no-store, must-revalidate";
                  add_header Pragma "no-cache";
                  add_header Expires "0";
              }
          }
          NGINXEOF
          
          # Enable the site and reload nginx
          ln -sf /etc/nginx/sites-available/racc-membership-app /etc/nginx/sites-enabled/
          nginx -t && systemctl reload nginx
          
          echo "Nginx configuration updated and reloaded"
          
          echo "Frontend service is running successfully"
          echo "Deployment completed successfully!"
          ENDSSH