
name: Deploy to DigitalOcean

on:
  push:
    branches: [dev]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DO_DEPLOY_KEY }}

      - name: Deploy to Droplet
        env:
          # Backend environment variables (mix of secrets and vars)
          PORT: ${{ vars.PORT }}
          NODE_ENV: ${{ vars.NODE_ENV }}
          PRIVATE_INTEGRATION_TOKEN: ${{ secrets.PRIVATE_INTEGRATION_TOKEN }}
          LOCATION_ID: ${{ vars.LOCATION_ID }}
          CALENDAR_ID: ${{ vars.CALENDAR_ID }}
          TEST_CONTACT_ID: ${{ vars.TEST_CONTACT_ID }}
          GHL_API_BASE_URL: ${{ vars.GHL_API_BASE_URL }}
          FRONTEND_URL: ${{ vars.FRONTEND_URL }}
          # Frontend environment variables
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          TEMP_GHL_TOKEN: ${{ secrets.TEMP_GHL_TOKEN }}
        run: |
          ssh -o StrictHostKeyChecking=no root@racc-dev.openskydev.com << ENDSSH
          cd /root/racc-membership-app || git clone https://github.com/openskysolutions/racc-membership-app.git && cd racc-membership-app
          git pull
          
          # Set all environment variables for the entire session
          export PORT="$PORT"
          export NODE_ENV="$NODE_ENV"
          export PRIVATE_INTEGRATION_TOKEN="$PRIVATE_INTEGRATION_TOKEN"
          export LOCATION_ID="$LOCATION_ID"
          export CALENDAR_ID="$CALENDAR_ID"
          export TEST_CONTACT_ID="$TEST_CONTACT_ID"
          export GHL_API_BASE_URL="$GHL_API_BASE_URL"
          export FRONTEND_URL="$FRONTEND_URL"
          export VITE_API_BASE_URL="$VITE_API_BASE_URL"
          export TEMP_GHL_TOKEN="$TEMP_GHL_TOKEN"
          
          # Create backend .env file
          cd ghl-api
          cat > .env << EOF
          PORT=\$PORT
          NODE_ENV=\$NODE_ENV
          PRIVATE_INTEGRATION_TOKEN=\$PRIVATE_INTEGRATION_TOKEN
          LOCATION_ID=\$LOCATION_ID
          CALENDAR_ID=\$CALENDAR_ID
          TEST_CONTACT_ID=\$TEST_CONTACT_ID
          GHL_API_BASE_URL=\$GHL_API_BASE_URL
          FRONTEND_URL=\$FRONTEND_URL
          EOF
          
          # Install all dependencies (including devDependencies for build tools)
          npm install
          
          # Build the API with proper path alias resolution
          npm run build
          
          # Verify the build was successful and imports are resolved
          if [ ! -f "dist/server.js" ]; then
            echo "ERROR: API build failed - dist/server.js not found"
            exit 1
          fi
          
          # Check that path aliases were properly resolved in the build
          if grep -q "@/" dist/app.js; then
            echo "ERROR: Path aliases not resolved in build - found '@/' imports"
            exit 1
          fi
          
          echo "API build successful - path aliases properly resolved"
          pm2 describe racc-api > /dev/null
          if [ \$? -eq 0 ]; then
            echo "Restarting existing racc-api service"
            pm2 restart racc-api
          else
            echo "Starting new racc-api service"
            pm2 start dist/server.js --name racc-api
          fi
          
          # Verify API is running
          sleep 2
          if ! pm2 describe racc-api | grep -q "online"; then
            echo "ERROR: racc-api failed to start"
            pm2 logs racc-api --lines 10
            exit 1
          fi
          
          echo "API service is running successfully"
          
          # Create frontend .env file
          cd ../
          cat > .env << EOF
          VITE_API_BASE_URL=\$VITE_API_BASE_URL
          TEMP_GHL_TOKEN=\$TEMP_GHL_TOKEN
          EOF
          
          # Debug: Show environment variables
          echo "=== Environment Variables for Frontend Build ==="
          echo "VITE_API_BASE_URL=\$VITE_API_BASE_URL"
          echo "TEMP_GHL_TOKEN=\$TEMP_GHL_TOKEN"
          echo "=== Contents of .env file ==="
          cat .env
          echo "=== End Debug ==="
          
          # Clean any existing build and node_modules cache
          rm -rf dist/ node_modules/.vite/
          
          # Install dependencies including devDependencies for build tools
          # This ensures all build tools like @vitejs/plugin-react are available
          NODE_ENV=development npm install
          
          # Verify critical build dependencies are installed
          if [ ! -d "node_modules/@vitejs/plugin-react" ]; then
            echo "ERROR: @vitejs/plugin-react not found in node_modules"
            exit 1
          fi
          
          if [ ! -d "node_modules/vite" ]; then
            echo "ERROR: vite not found in node_modules"
            exit 1
          fi
          
          echo "Build dependencies verified successfully"
          
          # Build frontend with environment variables
          VITE_API_BASE_URL="\$VITE_API_BASE_URL" TEMP_GHL_TOKEN="\$TEMP_GHL_TOKEN" npm run build
          
          # Verify frontend build was successful
          if [ ! -f "dist/index.html" ]; then
            echo "ERROR: Frontend build failed - dist/index.html not found"
            exit 1
          fi
          
          echo "Frontend build successful"
          
          # Verify the build used the correct API URL
          echo "=== Checking built files for API URL ==="
          grep -r "localhost:3000" dist/ || echo "No localhost:3000 found in build"
          grep -r "racc-dev.openskydev.com" dist/ | head -3 || echo "No production URL found in build"
          
          # Copy built files to /var/www/racc-membership-app/dist
          cp -r dist/* /var/www/racc-membership-app/dist/
          
          # Copy serve.js to the frontend directory
          cp serve.js /var/www/racc-membership-app/
          
          chmod -R 755 /var/www/racc-membership-app/dist
          find /var/www/racc-membership-app/dist -type f -exec chmod 644 {} \;
          
          # Start or restart frontend service using serve.js
          pm2 describe racc-frontend > /dev/null
          if [ \$? -eq 0 ]; then
            echo "Restarting existing racc-frontend service"
            pm2 restart racc-frontend
          else
            echo "Starting new racc-frontend service with serve.js"
            cd /var/www/racc-membership-app
            pm2 start serve.js --name racc-frontend
          fi
          
          # Verify frontend service is running
          sleep 2
          if ! pm2 describe racc-frontend | grep -q "online"; then
            echo "ERROR: racc-frontend failed to start"
            pm2 logs racc-frontend --lines 10
            exit 1
          fi
          
          echo "Frontend service is running successfully"
          echo "Deployment completed successfully!"
          ENDSSH